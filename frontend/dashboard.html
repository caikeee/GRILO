<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRILO - Dashboard de Observabilidade</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #888;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #888;
            padding: 60px 20px;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            color: white;
            font-weight: 500;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
        }

        .card-title {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .card-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 8px;
        }

        .card-label {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 15px;
        }

        .card-stat {
            font-size: 0.85rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .badge-warning {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        /* Section Titles */
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-top: 50px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #22c55e;
            display: inline-block;
        }

        /* Charts */
        .chart-container {
            background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            height: 400px;
        }

        .chart-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        canvas {
            position: relative !important;
            height: 300px !important;
        }

        /* Insights */
        .insights-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .insight {
            background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
            border-left: 4px solid #22c55e;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .insight.warning {
            border-left-color: #ef4444;
        }

        .insight.info {
            border-left-color: #3b82f6;
        }

        .insight.success {
            border-left-color: #22c55e;
        }

        .insight-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 5px;
            color: #fff;
        }

        .insight-message {
            font-size: 0.85rem;
            color: #a0a0a0;
            line-height: 1.4;
        }

        /* Table */
        .table-container {
            background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(34, 197, 94, 0.1);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            color: #22c55e;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
            color: #d0d0d0;
        }

        tr:hover {
            background: rgba(34, 197, 94, 0.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .card-value {
                font-size: 1.8rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .chart-container {
                height: 300px;
            }
        }

        .refresh-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .refresh-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .last-updated {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>
                <span class="logo-icon">📊</span>
                GRILO Observabilidade
            </h1>
            <p class="subtitle">Dashboard de métricas e insights do sistema</p>
            <button class="refresh-btn" onclick="loadAnalytics()">🔄 Atualizar</button>
            <p class="last-updated" id="lastUpdated"></p>
        </header>

        <!-- Main Content -->
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Carregando analytics...
            </div>
        </div>
    </div>

    <script src="assets/js/dashboard.js?v=2"></script>
</body>
</html>
