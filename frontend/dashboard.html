<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRILO — Painel Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/sage-color-system.css">
    <link rel="stylesheet" href="assets/css/sage-premium-polish.css">

    <script>if (!localStorage.getItem('grilo_token')) window.location.replace('/');</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-secondary, #F7FAF9);
            color: var(--text-primary, #1F3B2D);
            min-height: 100vh;
        }

        /* ── TOP BAR ── */
        .db-topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border-color, #D9E7DC);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .db-topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .db-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .db-logo-mark {
            font-size: 1.3rem;
            line-height: 1;
        }

        .db-logo-text {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--sage-dark, #3A5E47);
            letter-spacing: 0.04em;
        }

        .db-divider {
            width: 1px;
            height: 20px;
            background: var(--border-color, #D9E7DC);
        }

        .db-page-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-tertiary, #6A7B71);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .db-topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .db-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
        }

        .db-last-update {
            font-size: 0.78rem;
            color: var(--text-light, #A8B5AA);
        }

        .db-refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 14px;
            border: 1px solid var(--border-color, #D9E7DC);
            border-radius: 8px;
            background: #fff;
            color: var(--text-secondary, #354839);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .db-refresh-btn:hover {
            border-color: var(--sage-primary, #7A9E84);
            color: var(--sage-medium, #5A7E66);
            background: rgba(122,158,132,0.04);
        }

        .db-refresh-btn.loading svg {
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── PAGE LAYOUT ── */
        .db-page {
            padding: 32px;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ── SECTION HEADER ── */
        .db-section {
            margin-bottom: 40px;
        }

        .db-section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .db-section-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(122,158,132,0.14), rgba(90,126,102,0.08));
            border: 1px solid rgba(122,158,132,0.18);
            display: grid;
            place-items: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .db-section-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-tertiary, #6A7B71);
        }

        /* ── INSIGHT STRIP ── */
        .db-insights {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .db-insight {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            background: #fff;
            border: 1px solid var(--border-color, #D9E7DC);
            border-left-width: 3px;
            transition: box-shadow 0.2s ease;
        }

        .db-insight:hover {
            box-shadow: 0 4px 16px rgba(90,126,102,0.08);
        }

        .db-insight.success { border-left-color: #22c55e; }
        .db-insight.warning { border-left-color: #f59e0b; }
        .db-insight.info    { border-left-color: var(--sage-primary, #7A9E84); }

        .db-insight-icon {
            font-size: 1rem;
            line-height: 1.4;
            flex-shrink: 0;
        }

        .db-insight-body {}
        .db-insight-title {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text-primary, #1F3B2D);
            margin-bottom: 2px;
        }

        .db-insight-msg {
            font-size: 0.82rem;
            color: var(--text-tertiary, #6A7B71);
            line-height: 1.5;
        }

        /* ── GRID ── */
        .db-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .db-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .db-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        /* ── METRIC CARD ── */
        .db-card {
            background: #fff;
            border: 1px solid var(--border-color, #D9E7DC);
            border-radius: 14px;
            padding: 20px 22px;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .db-card:hover {
            box-shadow: 0 6px 20px rgba(90,126,102,0.1);
            transform: translateY(-1px);
        }

        .db-card-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-tertiary, #6A7B71);
            margin-bottom: 10px;
        }

        .db-card-value {
            font-family: 'Manrope', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary, #1F3B2D);
            line-height: 1;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .db-card-value.sm {
            font-size: 1.5rem;
        }

        .db-card-sub {
            font-size: 0.78rem;
            color: var(--text-light, #A8B5AA);
            line-height: 1.4;
        }

        .db-card-footer {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light, #EDF8F0);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* card accent strip */
        .db-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #7A9E84, #5A7E66);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .db-card:hover::before { opacity: 1; }
        .db-card.accent::before { opacity: 1; }

        /* ── STATUS BADGE ── */
        .db-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .db-badge.ok {
            background: rgba(34,197,94,0.1);
            color: #15803d;
        }

        .db-badge.warn {
            background: rgba(245,158,11,0.12);
            color: #b45309;
        }

        .db-badge.info {
            background: rgba(122,158,132,0.12);
            color: #3A5E47;
        }

        .db-badge.neutral {
            background: rgba(107,114,128,0.1);
            color: #4b5563;
        }

        /* ── WIDE CARD ── */
        .db-card-wide {
            background: #fff;
            border: 1px solid var(--border-color, #D9E7DC);
            border-radius: 14px;
            padding: 22px 26px;
        }

        .db-card-wide-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-tertiary, #6A7B71);
            margin-bottom: 18px;
        }

        /* ── PROGRESS BAR ── */
        .db-progress-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .db-progress-label {
            font-size: 0.82rem;
            color: var(--text-secondary, #354839);
            font-weight: 500;
            min-width: 120px;
        }

        .db-progress-track {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary, #EEF2EF);
            border-radius: 99px;
            overflow: hidden;
        }

        .db-progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #7A9E84, #5A7E66);
            transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
        }

        .db-progress-fill.amber {
            background: linear-gradient(90deg, #f59e0b, #d97706);
        }

        .db-progress-fill.green {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        .db-progress-val {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-tertiary, #6A7B71);
            min-width: 36px;
            text-align: right;
        }

        /* ── TOPIC ROWS ── */
        .db-topic-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 0;
            border-bottom: 1px solid var(--border-light, #EDF8F0);
        }

        .db-topic-row:last-child { border-bottom: none; }

        .db-topic-name {
            font-size: 0.84rem;
            color: var(--text-secondary, #354839);
        }

        .db-topic-count {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--text-primary, #1F3B2D);
        }

        /* ── TABLE ── */
        .db-table-wrap {
            background: #fff;
            border: 1px solid var(--border-color, #D9E7DC);
            border-radius: 14px;
            overflow: hidden;
        }

        .db-table {
            width: 100%;
            border-collapse: collapse;
        }

        .db-table th {
            background: var(--bg-secondary, #F7FAF9);
            padding: 12px 18px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-tertiary, #6A7B71);
            border-bottom: 1px solid var(--border-color, #D9E7DC);
            text-align: left;
        }

        .db-table td {
            padding: 12px 18px;
            font-size: 0.86rem;
            color: var(--text-secondary, #354839);
            border-bottom: 1px solid var(--border-light, #EDF8F0);
        }

        .db-table tr:last-child td { border-bottom: none; }
        .db-table tr:hover td { background: rgba(122,158,132,0.04); }

        /* ── CHART WRAPPER ── */
        .db-chart-card {
            background: #fff;
            border: 1px solid var(--border-color, #D9E7DC);
            border-radius: 14px;
            padding: 22px 26px;
        }

        .db-chart-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-tertiary, #6A7B71);
            margin-bottom: 20px;
        }

        .db-chart-wrap {
            position: relative;
            height: 280px;
        }

        /* ── DIFFICULTY PILLS ── */
        .db-diff-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .db-diff-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            border-radius: 10px;
            border: 1px solid var(--border-light, #EDF8F0);
        }

        .db-diff-pill.easy  { background: rgba(34,197,94,0.06); }
        .db-diff-pill.med   { background: rgba(245,158,11,0.07); }
        .db-diff-pill.hard  { background: rgba(239,68,68,0.06); }

        .db-diff-num {
            font-family: 'Manrope', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary, #1F3B2D);
        }

        .db-diff-lbl {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 2px;
            color: var(--text-light, #A8B5AA);
        }

        /* ── ERROR / LOADING ── */
        .db-loading {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 60px 32px;
            color: var(--text-light, #A8B5AA);
            font-size: 0.9rem;
        }

        .db-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(122,158,132,0.2);
            border-top-color: #7A9E84;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        .db-error {
            margin: 32px;
            padding: 18px 22px;
            border-radius: 12px;
            background: rgba(239,68,68,0.06);
            border: 1px solid rgba(239,68,68,0.18);
            border-left: 3px solid #ef4444;
            color: #b91c1c;
            font-size: 0.88rem;
            font-weight: 500;
        }

        /* ── ALERTAS ── */
        .db-section-alerts .db-section-header {
            margin-bottom: 14px;
        }
        .db-alert-summary {
            margin-left: auto;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .db-alert-summary.critical { background: rgba(239,68,68,0.1); color: #b91c1c; }
        .db-alert-summary.warning  { background: rgba(234,179,8,0.12); color: #92400e; }
        .db-alert-summary.ok       { background: rgba(34,197,94,0.1);  color: #166534; }

        .db-alerts-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .db-alert {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid;
        }
        .db-alert-critical {
            background: rgba(239,68,68,0.05);
            border-color: rgba(239,68,68,0.2);
            border-left: 3px solid #ef4444;
        }
        .db-alert-warning {
            background: rgba(234,179,8,0.05);
            border-color: rgba(234,179,8,0.2);
            border-left: 3px solid #eab308;
        }
        .db-alert-info {
            background: rgba(99,102,241,0.04);
            border-color: rgba(99,102,241,0.15);
            border-left: 3px solid #6366f1;
        }
        .db-alert-icon { font-size: 1.1rem; margin-top: 1px; flex-shrink: 0; }
        .db-alert-body { flex: 1; }
        .db-alert-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-primary, #1F3B2D);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .db-alert-msg {
            font-size: 0.82rem;
            color: var(--text-muted, #6A7B71);
            line-height: 1.4;
        }
        .db-alert-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .db-alert-badge-critical { background: rgba(239,68,68,0.12); color: #b91c1c; }
        .db-alert-badge-warning  { background: rgba(234,179,8,0.12);  color: #92400e; }
        .db-alert-badge-info     { background: rgba(99,102,241,0.1);   color: #4338ca; }

        /* ── COHORT TABLE ── */
        .db-table-cohort { max-width: 100%; overflow-x: auto; }
        .db-cohort-week  { font-size: 0.81rem; font-weight: 500; white-space: nowrap; color: var(--text-primary, #1F3B2D); }
        .db-cohort-size  { text-align: center; font-size: 0.84rem; font-weight: 600; }
        .db-cohort-pct   { text-align: center; font-size: 0.84rem; font-weight: 600; border-radius: 6px; }
        .db-cohort-na    { text-align: center; color: #aaa; font-size: 0.8rem; }
        .db-cohort-ok   { background: rgba(34,197,94,0.12);  color: #166534; }
        .db-cohort-warn { background: rgba(234,179,8,0.12);  color: #92400e; }
        .db-cohort-bad  { background: rgba(239,68,68,0.10);  color: #b91c1c; }
        .db-cohort-legend {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-muted, #6A7B71);
        }
        .db-cohort-ok-dot, .db-cohort-warn-dot, .db-cohort-bad-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 3px;
        }
        .db-cohort-ok-dot   { background: rgba(34,197,94,0.6); }
        .db-cohort-warn-dot { background: rgba(234,179,8,0.6); }
        .db-cohort-bad-dot  { background: rgba(239,68,68,0.5); }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) {
            .db-grid-4 { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .db-page { padding: 20px 16px; }
            .db-topbar { padding: 0 16px; }
            .db-grid-4, .db-grid-3, .db-grid-2 { grid-template-columns: 1fr; }
            .db-card-value { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <header class="db-topbar">
        <div class="db-topbar-left">
            <a href="/home.html" class="db-logo">
                <span class="db-logo-mark">🦗</span>
                <span class="db-logo-text">GRILO</span>
            </a>
            <div class="db-divider"></div>
            <span class="db-page-title">Painel Admin</span>
        </div>
        <div class="db-topbar-right">
            <div class="db-status-dot" id="statusDot" title="Ao vivo"></div>
            <span class="db-last-update" id="lastUpdated">—</span>
            <button class="db-refresh-btn" id="refreshBtn" onclick="loadAnalytics()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                Atualizar
            </button>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="db-page" id="content">
        <div class="db-loading">
            <div class="db-spinner"></div>
            Carregando métricas...
        </div>
    </main>

    <script src="assets/js/dashboard.js?v=3"></script>
</body>
</html>
